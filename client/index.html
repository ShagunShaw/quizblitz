<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizblitz</title>
    <style>
        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #ffffff;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .google-btn img {
            width: 18px;
            height: 18px;
        }

        .google-btn:hover {
            background-color: #f7f8f8;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .google-btn:active {
            background-color: #eee;
        }
    </style>
</head>

<body>
    <button class="google-btn" onclick="window.location.href='http://localhost:3000/api/v1/auth/google'">
        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google logo">
        <span>Sign in with Google</span>
    </button>
</body>
</html>
